<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BellaVista Ristorante</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="restaurant-landing">
        <header class="landing-header">
            <div class="header-content">
                <h1 id="headline"></h1>
                <h2 id="subtitle"></h2>
            </div>
        </header>

        <section id="restaurant-presentation" class="section">
            <div class="container">
                <p id="description"></p>
                <div class="location-info">
                    <span id="location"></span>
                    <span id="gps-coordinates"></span>
                </div>
            </div>
        </section>

        <section id="menu-degustazione" class="section">
            <div class="container">
                <h3 id="menu-title"></h3>
                <div id="menu-offer"></div>
            </div>
        </section>

        <section id="gallery" class="section">
            <div class="gallery-container"></div>
        </section>

        <section id="reservation" class="section">
            <div class="container">
                <a href="#" id="reservation-link" class="cta-button"></a>
            </div>
        </section>

        <section id="contact" class="section">
            <div class="container">
                <h3 id="contact-title"></h3>
                <div class="contact-info">
                    <span id="phone"></span>
                    <span id="email"></span>
                    <a href="#" id="maps-link">Vedi su Google Maps</a>
                </div>
            </div>
        </section>

        <footer id="site-footer">
            <p id="footer-text"></p>
            <div id="social-media"></div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
